<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>when2meet</title>
    <script>
      (function () {
        var saved = localStorage.getItem("w2m-theme");
        var theme =
          saved ||
          (window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #141414;
        --surface2: #1e1e1e;
        --border: #2a2a2a;
        --text: #e5e5e5;
        --text2: #888;
        --accent: #22c55e;
        --accent-dim: #16a34a;
        --accent-text: #000;
        --unavail: #1e1e1e;
        --avail: #22c55e;
        --day-past: #444;
        --hour-border: #333;
        --half-border: #222;
        --legend-base: #1e1e1e;
        --heatmap-base-rgb: 30, 30, 30;
        --heatmap-target-rgb: 34, 197, 94;
        --gutter-night-rgb: 30, 30, 30;
        --gutter-day-rgb: 110, 95, 40;
        color-scheme: dark;
      }

      [data-theme="light"] {
        --bg: #ffffff;
        --surface: #f7f7f7;
        --surface2: #ececec;
        --border: #d4d4d4;
        --text: #171717;
        --text2: #666;
        --accent: #16a34a;
        --accent-dim: #15803d;
        --accent-text: #ffffff;
        --unavail: #ececec;
        --avail: #16a34a;
        --day-past: #bbb;
        --hour-border: #c0c0c0;
        --half-border: #dcdcdc;
        --legend-base: #ececec;
        --heatmap-base-rgb: 236, 236, 236;
        --heatmap-target-rgb: 22, 163, 74;
        --gutter-night-rgb: 220, 225, 235;
        --gutter-day-rgb: 255, 240, 200;
        color-scheme: light;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }

      h1 {
        font-size: 24px;
        font-weight: 600;
      }
      h2 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 16px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 32px;
      }

      header a {
        color: var(--text);
        text-decoration: none;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        font-size: 14px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn:hover {
        background: var(--surface2);
      }
      .btn-primary {
        background: var(--accent);
        color: var(--accent-text);
        border-color: var(--accent);
        font-weight: 600;
      }
      .btn-primary:hover {
        background: var(--accent-dim);
      }

      input,
      select {
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        font-size: 14px;
        outline: none;
      }
      input:focus,
      select:focus {
        border-color: var(--accent);
      }

      label {
        font-size: 14px;
        color: var(--text2);
        margin-bottom: 4px;
        display: block;
      }

      /* -- Create Page -- */
      #create-page .form-group {
        margin-bottom: 20px;
      }
      #create-page input[type="text"] {
        width: 100%;
        font-size: 18px;
        padding: 12px 16px;
      }
      #create-page select {
        width: 100%;
      }

      .create-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
        align-items: start;
      }
      .settings-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
      }
      .settings-panel .form-group:last-of-type {
        margin-bottom: 0;
      }

      .time-range {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 8px;
        align-items: center;
      }
      .time-range .sep {
        color: var(--text2);
        font-size: 14px;
        text-align: center;
      }

      @media (min-width: 720px) {
        .create-layout {
          grid-template-columns: minmax(0, auto) minmax(260px, 1fr);
          gap: 32px;
        }
        .calendar-col {
          min-width: 0;
        }
      }

      .calendar-picker {
        display: inline-grid;
        grid-template-columns: repeat(7, 40px);
        gap: 2px;
        user-select: none;
      }
      .calendar-picker .day-header {
        text-align: center;
        font-size: 12px;
        color: var(--text2);
        padding: 4px;
      }
      .calendar-picker .day {
        width: 40px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.1s;
        border: 1px solid transparent;
      }
      .calendar-picker .day:hover {
        background: var(--surface2);
      }
      .calendar-picker .day.selected {
        background: var(--accent);
        color: var(--accent-text);
        font-weight: 600;
      }
      .calendar-picker .day.empty {
        pointer-events: none;
      }
      .calendar-picker .day.past {
        color: var(--day-past);
        pointer-events: none;
      }

      .cal-nav {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
      }
      .cal-nav span {
        font-size: 15px;
        font-weight: 500;
        min-width: 140px;
      }
      .cal-nav button {
        background: none;
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 6px;
        padding: 4px 10px;
        cursor: pointer;
        font-size: 14px;
      }
      .cal-nav button:hover {
        background: var(--surface2);
      }

      /* -- Event Page -- */
      #event-page {
        display: none;
      }

      .event-header {
        margin-bottom: 24px;
      }
      .event-header h2 {
        margin-bottom: 8px;
      }
      .share-url {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .share-url input {
        flex: 1;
        max-width: 400px;
        font-family: monospace;
        font-size: 13px;
      }

      .event-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }

      @media (max-width: 800px) {
        .event-layout {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
      }

      .name-input-row {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .name-input-row input {
        flex: 1;
      }

      /* -- Availability Grid -- */
      .grid-wrapper {
        overflow-x: auto;
        padding-bottom: 8px;
      }

      .avail-grid {
        display: inline-block;
        user-select: none;
        -webkit-user-select: none;
      }
      .grid-body {
        position: relative;
      }
      .time-line {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 56px;
        width: 3px;
        pointer-events: none;
      }

      .grid-header {
        display: flex;
        padding-left: 56px;
      }
      .grid-header .col-header {
        width: 48px;
        text-align: center;
        font-size: 11px;
        color: var(--text2);
        line-height: 1.3;
        padding-bottom: 6px;
      }

      .grid-row {
        display: flex;
        align-items: center;
      }
      .grid-time {
        width: 56px;
        text-align: right;
        padding-right: 8px;
        font-size: 11px;
        color: var(--text2);
        flex-shrink: 0;
      }
      .grid-cell {
        width: 48px;
        height: 12px;
        border-right: 1px solid var(--bg);
        transition: background 0.05s;
        cursor: pointer;
      }
      .grid-cell:last-child {
        border-right: none;
      }

      .grid-row.hour-start .grid-cell {
        border-top: 1px solid var(--hour-border);
      }
      .grid-row.half-start .grid-cell {
        border-top: 1px solid var(--half-border);
      }

      /* Personal grid colors */
      .personal-grid .grid-cell {
        background: var(--unavail);
      }
      .personal-grid .grid-cell.available {
        background: var(--avail);
      }
      .personal-grid .grid-cell.dragging {
        opacity: 0.7;
      }

      .legend {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        font-size: 12px;
        color: var(--text2);
      }
      .legend-bar {
        width: 120px;
        height: 12px;
        border-radius: 3px;
        background: linear-gradient(
          to right,
          var(--legend-base),
          var(--accent)
        );
      }

      .theme-toggle {
        margin-left: auto;
      }

      .hover-info {
        min-height: 48px;
        padding: 8px;
        background: var(--surface2);
        border-radius: 8px;
        margin-top: 12px;
        font-size: 13px;
      }
      .hover-info .time {
        font-weight: 600;
        margin-bottom: 4px;
      }
      .hover-info .names {
        color: var(--text2);
      }

      .participants-list {
        margin-top: 16px;
        font-size: 13px;
        color: var(--text2);
      }
      .participants-list span {
        display: inline-block;
        padding: 2px 8px;
        background: var(--surface2);
        border-radius: 4px;
        margin: 2px;
      }

      .instruction {
        font-size: 12px;
        color: var(--text2);
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- CREATE PAGE -->
      <div id="create-page">
        <header>
          <a href="/"><h1>when2meet</h1></a>
          <button
            class="btn theme-toggle"
            data-theme-toggle
            aria-label="Toggle theme"
          ></button>
        </header>

        <div class="form-group">
          <label>Event Name</label>
          <input
            type="text"
            id="event-name"
            placeholder="Team sync, Dinner plans..."
          />
        </div>

        <div class="create-layout">
          <div class="calendar-col">
            <div class="form-group" style="margin-bottom: 0">
              <label>Select Dates</label>
              <div class="cal-nav">
                <button id="cal-prev">&larr;</button>
                <span id="cal-month-label"></span>
                <button id="cal-next">&rarr;</button>
              </div>
              <div id="calendar" class="calendar-picker"></div>
            </div>
          </div>

          <div class="settings-panel">
            <button
              class="btn btn-primary"
              id="create-btn"
              style="width: 100%; justify-content: center"
            >
              Create Event
            </button>
          </div>
        </div>
      </div>

      <!-- EVENT PAGE -->
      <div id="event-page">
        <header>
          <a href="/"><h1>when2meet</h1></a>
          <button
            class="btn theme-toggle"
            data-theme-toggle
            aria-label="Toggle theme"
          ></button>
        </header>

        <div class="event-header">
          <h2 id="event-title"></h2>
          <div
            id="event-tz-info"
            style="font-size: 12px; color: var(--text2); margin: 4px 0 12px"
          ></div>
          <div class="share-url">
            <input type="text" id="share-url" readonly />
            <button class="btn" id="copy-btn">Copy</button>
          </div>
        </div>

        <div class="event-layout">
          <!-- Left: personal availability -->
          <div class="panel">
            <div class="name-input-row">
              <input
                type="text"
                id="participant-name"
                placeholder="Your name"
              />
              <button class="btn btn-primary" id="join-btn">Join</button>
            </div>
            <div id="personal-section" style="display: none">
              <div class="instruction">
                Click and drag to mark availability. Saves automatically.
              </div>
              <div class="grid-wrapper">
                <div id="personal-grid" class="avail-grid personal-grid"></div>
              </div>
            </div>
          </div>

          <!-- Right: group availability -->
          <div class="panel">
            <h2>Group Availability</h2>
            <div class="legend">
              <span>0</span>
              <div class="legend-bar"></div>
              <span id="legend-max">0</span>
              <span>available</span>
            </div>
            <div class="grid-wrapper">
              <div id="group-grid" class="avail-grid"></div>
            </div>
            <div id="hover-info" class="hover-info" style="display: none">
              <div class="time" id="hover-time"></div>
              <div class="names" id="hover-names"></div>
            </div>
            <div id="participants-list" class="participants-list"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ===== State =====
      let currentEvent = null;
      let currentName = "";
      let mySlots = new Set();
      let isDragging = false;
      let dragMode = null;
      let dragCells = [];

      // ===== Utilities =====
      function escHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function $(id) {
        return document.getElementById(id);
      }

      // ===== Calendar Picker =====
      const selectedDates = new Set();
      let calYear, calMonth;

      function initCalendar() {
        const now = new Date();
        calYear = now.getFullYear();
        calMonth = now.getMonth();
        renderCalendar();
      }

      function calPrev() {
        calMonth--;
        if (calMonth < 0) {
          calMonth = 11;
          calYear--;
        }
        renderCalendar();
      }
      function calNext() {
        calMonth++;
        if (calMonth > 11) {
          calMonth = 0;
          calYear++;
        }
        renderCalendar();
      }

      function renderCalendar() {
        const el = $("calendar");
        const months = [
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ];
        $("cal-month-label").textContent = months[calMonth] + " " + calYear;

        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const firstDay = new Date(calYear, calMonth, 1).getDay();
        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

        el.textContent = "";
        ["S", "M", "T", "W", "T", "F", "S"].forEach((d) => {
          const hdr = document.createElement("div");
          hdr.className = "day-header";
          hdr.textContent = d;
          el.appendChild(hdr);
        });

        for (let i = 0; i < firstDay; i++) {
          const empty = document.createElement("div");
          empty.className = "day empty";
          el.appendChild(empty);
        }

        for (let d = 1; d <= daysInMonth; d++) {
          const date = new Date(calYear, calMonth, d);
          const key = dateKey(date);
          const dayEl = document.createElement("div");
          dayEl.className = "day";
          if (date < today) dayEl.classList.add("past");
          if (selectedDates.has(key)) dayEl.classList.add("selected");
          dayEl.textContent = d;
          dayEl.dataset.date = key;
          dayEl.addEventListener("click", () => toggleDate(key));
          el.appendChild(dayEl);
        }
      }

      function dateKey(d) {
        return (
          d.getFullYear() +
          "-" +
          String(d.getMonth() + 1).padStart(2, "0") +
          "-" +
          String(d.getDate()).padStart(2, "0")
        );
      }

      function toggleDate(key) {
        if (selectedDates.has(key)) selectedDates.delete(key);
        else selectedDates.add(key);
        renderCalendar();
      }

      // ===== Time Selects =====
      const USE_24H =
        new Intl.DateTimeFormat(undefined, {
          hour: "numeric",
        }).resolvedOptions().hour12 === false;

      function formatHourLabel(hour, minute = 0) {
        const mm = String(minute).padStart(2, "0");
        if (USE_24H) return String(hour % 24).padStart(2, "0") + ":" + mm;
        const ampm = hour % 24 < 12 ? "AM" : "PM";
        const h12 = hour % 12 === 0 ? 12 : hour % 12;
        return h12 + ":" + mm + " " + ampm;
      }

      const VIEWER_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;

      function showViewerTz() {
        const ev = $("event-tz-info");
        if (ev) ev.textContent = "Times shown in " + VIEWER_TZ;
      }

      // ===== Create Event =====
      async function createEvent() {
        const name = $("event-name").value.trim();
        const dates = [...selectedDates].sort();

        if (!name) return alert("Enter an event name");
        if (!dates.length) return alert("Select at least one date");

        const res = await fetch("/api/events", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, dates }),
        });
        const data = await res.json();
        history.pushState(null, "", "/" + data.id);
        loadEvent(data.id);
      }

      // ===== Load Event =====
      async function loadEvent(id) {
        const res = await fetch("/api/events/" + encodeURIComponent(id));
        if (!res.ok) {
          showCreate();
          return;
        }

        currentEvent = await res.json();
        $("create-page").style.display = "none";
        $("event-page").style.display = "block";
        $("event-title").textContent = currentEvent.name;
        $("share-url").value = window.location.href;

        renderGroupGrid();
        renderParticipantsList();

        const saved = localStorage.getItem("w2m-name-" + id);
        if (saved) {
          $("participant-name").value = saved;
          joinEvent();
        }
      }

      function showCreate() {
        $("create-page").style.display = "block";
        $("event-page").style.display = "none";
      }

      function copyUrl() {
        navigator.clipboard.writeText($("share-url").value);
        const btn = $("copy-btn");
        btn.textContent = "Copied!";
        setTimeout(() => {
          btn.textContent = "Copy";
        }, 1500);
      }

      // ===== Join Event =====
      function joinEvent() {
        const name = $("participant-name").value.trim();
        if (!name) return;

        currentName = name;
        localStorage.setItem("w2m-name-" + currentEvent.id, name);
        $("personal-section").style.display = "block";
        $("join-btn").textContent = "Switch";

        const existing = currentEvent.participants.find((p) => p.name === name);
        mySlots = new Set(existing ? existing.slots : []);

        renderPersonalGrid();
      }

      // ===== Grid Rendering =====
      function getTimeSlots() {
        const slots = [];
        for (let h = 0; h < 24; h++) {
          for (let m = 0; m < 60; m += 15) {
            slots.push({ hour: h, minute: m });
          }
        }
        return slots;
      }

      function slotKey(date, hour, minute) {
        const [y, m, d] = date.split("-").map(Number);
        return new Date(y, m - 1, d, hour, minute, 0, 0).toISOString();
      }

      function formatTime(hour, minute) {
        return formatHourLabel(hour, minute);
      }

      function formatDateShort(dateStr) {
        const [y, m, d] = dateStr.split("-").map(Number);
        const date = new Date(y, m - 1, d);
        const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const months = [
          "Jan",
          "Feb",
          "Mar",
          "Apr",
          "May",
          "Jun",
          "Jul",
          "Aug",
          "Sep",
          "Oct",
          "Nov",
          "Dec",
        ];
        return {
          dow: days[date.getDay()],
          label: months[date.getMonth()] + " " + d,
        };
      }

      function buildGridHeader(dates, parent) {
        const header = document.createElement("div");
        header.className = "grid-header";
        dates.forEach((d) => {
          const info = formatDateShort(d);
          const col = document.createElement("div");
          col.className = "col-header";
          col.appendChild(document.createTextNode(info.dow));
          col.appendChild(document.createElement("br"));
          col.appendChild(document.createTextNode(info.label));
          header.appendChild(col);
        });
        parent.appendChild(header);
      }

      function readRgbVar(name) {
        const v = getComputedStyle(document.documentElement)
          .getPropertyValue(name)
          .trim();
        return v.split(",").map((n) => parseInt(n.trim(), 10));
      }

      function buildTimeGradientLine() {
        const night = readRgbVar("--gutter-night-rgb");
        const day = readRgbVar("--gutter-day-rgb");
        const stops = [];
        for (let h = 0; h <= 24; h++) {
          const t = (1 - Math.cos((2 * Math.PI * h) / 24)) / 2;
          const r = Math.round(night[0] + (day[0] - night[0]) * t);
          const g = Math.round(night[1] + (day[1] - night[1]) * t);
          const b = Math.round(night[2] + (day[2] - night[2]) * t);
          stops.push(
            "rgb(" +
              r +
              "," +
              g +
              "," +
              b +
              ") " +
              ((h / 24) * 100).toFixed(2) +
              "%",
          );
        }
        const line = document.createElement("div");
        line.className = "time-line";
        line.style.background =
          "linear-gradient(to bottom, " + stops.join(", ") + ")";
        return line;
      }

      function buildGridRow(ts, dates, cellFactory) {
        const isHour = ts.minute === 0;
        const isHalf = ts.minute === 30;
        const row = document.createElement("div");
        row.className = "grid-row";
        if (isHour) row.classList.add("hour-start");
        else if (isHalf) row.classList.add("half-start");

        const timeLabel = document.createElement("div");
        timeLabel.className = "grid-time";
        timeLabel.textContent = isHour ? formatTime(ts.hour, ts.minute) : "";
        row.appendChild(timeLabel);

        dates.forEach((d) => {
          const key = slotKey(d, ts.hour, ts.minute);
          const cell = cellFactory(key, d);
          row.appendChild(cell);
        });
        return row;
      }

      function renderPersonalGrid() {
        const grid = $("personal-grid");
        grid.textContent = "";
        const dates = currentEvent.dates;
        const timeSlots = getTimeSlots();

        buildGridHeader(dates, grid);

        const body = document.createElement("div");
        body.className = "grid-body";
        body.appendChild(buildTimeGradientLine());

        timeSlots.forEach((ts) => {
          const row = buildGridRow(ts, dates, (key) => {
            const cell = document.createElement("div");
            cell.className = "grid-cell";
            if (mySlots.has(key)) cell.classList.add("available");
            cell.dataset.slot = key;
            return cell;
          });
          body.appendChild(row);
        });

        grid.appendChild(body);
        attachDragHandlers(grid);
      }

      function renderGroupGrid() {
        const grid = $("group-grid");
        grid.textContent = "";
        const dates = currentEvent.dates;
        const timeSlots = getTimeSlots();
        const participants = currentEvent.participants;
        const totalP = participants.length;

        $("legend-max").textContent = totalP;

        const countMap = {};
        const namesMap = {};
        participants.forEach((p) => {
          p.slots.forEach((s) => {
            countMap[s] = (countMap[s] || 0) + 1;
            if (!namesMap[s]) namesMap[s] = [];
            namesMap[s].push(p.name);
          });
        });

        buildGridHeader(dates, grid);

        const body = document.createElement("div");
        body.className = "grid-body";
        body.appendChild(buildTimeGradientLine());

        const base = readRgbVar("--heatmap-base-rgb");
        const target = readRgbVar("--heatmap-target-rgb");

        timeSlots.forEach((ts) => {
          const row = buildGridRow(ts, dates, (key) => {
            const cell = document.createElement("div");
            cell.className = "grid-cell";
            const count = countMap[key] || 0;
            const names = namesMap[key] || [];
            if (count > 0 && totalP > 0) {
              const ratio = count / totalP;
              const r = Math.round(base[0] + (target[0] - base[0]) * ratio);
              const g = Math.round(base[1] + (target[1] - base[1]) * ratio);
              const b = Math.round(base[2] + (target[2] - base[2]) * ratio);
              cell.style.background = "rgb(" + r + "," + g + "," + b + ")";
            }
            cell.dataset.slot = key;
            cell.dataset.count = count;
            cell.dataset.names = names.join(", ");
            cell.addEventListener("mouseenter", () => showHover(cell));
            cell.addEventListener("mouseleave", hideHover);
            return cell;
          });
          body.appendChild(row);
        });

        grid.appendChild(body);
      }

      function renderParticipantsList() {
        const el = $("participants-list");
        el.textContent = "";
        if (!currentEvent.participants.length) {
          el.textContent = "No participants yet";
          return;
        }
        const label = document.createElement("div");
        label.style.cssText =
          "margin-bottom:4px;font-size:12px;color:var(--text2);";
        label.textContent = "Participants:";
        el.appendChild(label);
        currentEvent.participants.forEach((p) => {
          const span = document.createElement("span");
          span.textContent = p.name;
          el.appendChild(span);
        });
      }

      // ===== Hover on Group Grid =====
      function showHover(cell) {
        const info = $("hover-info");
        const slot = cell.dataset.slot;
        const count = cell.dataset.count;
        const names = cell.dataset.names;
        const total = currentEvent.participants.length;

        const dt = new Date(slot);
        const dateStr = dateKey(dt);
        const dateInfo = formatDateShort(dateStr);

        info.style.display = "block";
        $("hover-time").textContent =
          dateInfo.dow +
          " " +
          dateInfo.label +
          " " +
          formatTime(dt.getHours(), dt.getMinutes()) +
          " \u2014 " +
          count +
          "/" +
          total +
          " available";
        $("hover-names").textContent = names || "Nobody";
      }

      function hideHover() {
        $("hover-info").style.display = "none";
      }

      // ===== Drag to Select (Personal Grid) =====
      function attachDragHandlers(grid) {
        function startDrag(e) {
          e.preventDefault();
          isDragging = true;
          dragCells = [];
          const target = e.target.closest(".grid-cell");
          if (!target) return;
          dragMode = mySlots.has(target.dataset.slot) ? "remove" : "add";
          applyDrag(target);
        }

        function moveDrag(e) {
          if (!isDragging) return;
          e.preventDefault();
          const target = e.type.startsWith("touch")
            ? document.elementFromPoint(
                e.touches[0].clientX,
                e.touches[0].clientY,
              )
            : e.target;
          if (target && target.classList.contains("grid-cell")) {
            applyDrag(target);
          }
        }

        function endDrag() {
          if (!isDragging) return;
          isDragging = false;
          dragCells.forEach((c) => c.classList.remove("dragging"));
          dragCells = [];
          saveAvailability();
        }

        function applyDrag(cell) {
          const key = cell.dataset.slot;
          if (dragMode === "add") {
            mySlots.add(key);
            cell.classList.add("available");
          } else {
            mySlots.delete(key);
            cell.classList.remove("available");
          }
          if (!dragCells.includes(cell)) {
            dragCells.push(cell);
            cell.classList.add("dragging");
          }
        }

        grid.addEventListener("mousedown", startDrag);
        grid.addEventListener("mousemove", moveDrag);
        document.addEventListener("mouseup", endDrag);
        grid.addEventListener("touchstart", startDrag, { passive: false });
        grid.addEventListener("touchmove", moveDrag, { passive: false });
        document.addEventListener("touchend", endDrag);
      }

      // ===== Save Availability =====
      let saveTimeout = null;
      function saveAvailability() {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(async () => {
          const slots = [...mySlots];
          await fetch(
            "/api/events/" +
              encodeURIComponent(currentEvent.id) +
              "/availability",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name: currentName, slots }),
            },
          );
          const res = await fetch(
            "/api/events/" + encodeURIComponent(currentEvent.id),
          );
          currentEvent = await res.json();
          renderGroupGrid();
          renderParticipantsList();
        }, 300);
      }

      // ===== Routing =====
      function route() {
        const path = window.location.pathname.slice(1);
        if (path && path !== "/") {
          loadEvent(path);
        } else {
          showCreate();
        }
      }

      window.addEventListener("popstate", route);

      // ===== Theme Toggle =====
      function updateThemeButtons() {
        const current = document.documentElement.getAttribute("data-theme");
        const label = current === "light" ? "Dark" : "Light";
        document.querySelectorAll("[data-theme-toggle]").forEach((btn) => {
          btn.textContent = label;
        });
      }

      function toggleTheme() {
        const current =
          document.documentElement.getAttribute("data-theme") === "light"
            ? "light"
            : "dark";
        const next = current === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("w2m-theme", next);
        updateThemeButtons();
        if (currentEvent) {
          renderGroupGrid();
          if (currentName) renderPersonalGrid();
        }
      }

      // ===== Event Listeners =====
      $("cal-prev").addEventListener("click", calPrev);
      $("cal-next").addEventListener("click", calNext);
      $("create-btn").addEventListener("click", createEvent);
      $("copy-btn").addEventListener("click", copyUrl);
      $("join-btn").addEventListener("click", joinEvent);
      document.querySelectorAll("[data-theme-toggle]").forEach((btn) => {
        btn.addEventListener("click", toggleTheme);
      });

      // ===== Init =====
      initCalendar();
      showViewerTz();
      updateThemeButtons();
      route();
    </script>
  </body>
</html>
