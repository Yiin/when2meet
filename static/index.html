<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>when2meet</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e5e5e5;
    --text2: #888;
    --accent: #22c55e;
    --accent-dim: #16a34a;
    --unavail: #1e1e1e;
    --avail: #22c55e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  h1 { font-size: 24px; font-weight: 600; }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  header a {
    color: var(--text);
    text-decoration: none;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--accent-dim); }

  input, select {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }

  label { font-size: 14px; color: var(--text2); margin-bottom: 4px; display: block; }

  /* -- Create Page -- */
  #create-page .form-group { margin-bottom: 20px; }
  #create-page input[type="text"] { width: 100%; font-size: 18px; padding: 12px 16px; }

  .time-row { display: flex; gap: 16px; align-items: end; flex-wrap: wrap; }
  .time-row .form-group { flex: 1; min-width: 140px; }

  .calendar-picker {
    display: inline-grid;
    grid-template-columns: repeat(7, 40px);
    gap: 2px;
    user-select: none;
  }
  .calendar-picker .day-header {
    text-align: center;
    font-size: 12px;
    color: var(--text2);
    padding: 4px;
  }
  .calendar-picker .day {
    width: 40px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.1s;
    border: 1px solid transparent;
  }
  .calendar-picker .day:hover { background: var(--surface2); }
  .calendar-picker .day.selected {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }
  .calendar-picker .day.empty { pointer-events: none; }
  .calendar-picker .day.past { color: #444; pointer-events: none; }

  .cal-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .cal-nav span { font-size: 15px; font-weight: 500; min-width: 140px; }
  .cal-nav button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 14px;
  }
  .cal-nav button:hover { background: var(--surface2); }

  /* -- Event Page -- */
  #event-page { display: none; }

  .event-header {
    margin-bottom: 24px;
  }
  .event-header h2 { margin-bottom: 8px; }
  .share-url {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .share-url input {
    flex: 1;
    max-width: 400px;
    font-family: monospace;
    font-size: 13px;
  }

  .event-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  @media (max-width: 800px) {
    .event-layout { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .name-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .name-input-row input { flex: 1; }

  /* -- Availability Grid -- */
  .grid-wrapper {
    overflow-x: auto;
    padding-bottom: 8px;
  }

  .avail-grid {
    display: inline-block;
    user-select: none;
    -webkit-user-select: none;
  }

  .grid-header {
    display: flex;
    padding-left: 56px;
  }
  .grid-header .col-header {
    width: 48px;
    text-align: center;
    font-size: 11px;
    color: var(--text2);
    line-height: 1.3;
    padding-bottom: 6px;
  }

  .grid-row {
    display: flex;
    align-items: center;
  }
  .grid-time {
    width: 56px;
    text-align: right;
    padding-right: 8px;
    font-size: 11px;
    color: var(--text2);
    flex-shrink: 0;
  }
  .grid-cell {
    width: 48px;
    height: 12px;
    border-right: 1px solid var(--bg);
    transition: background 0.05s;
    cursor: pointer;
  }
  .grid-cell:last-child { border-right: none; }

  .grid-row.hour-start .grid-cell { border-top: 1px solid #333; }
  .grid-row.half-start .grid-cell { border-top: 1px solid #222; }

  /* Personal grid colors */
  .personal-grid .grid-cell { background: var(--unavail); }
  .personal-grid .grid-cell.available { background: var(--avail); }
  .personal-grid .grid-cell.dragging { opacity: 0.7; }

  .legend {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--text2);
  }
  .legend-bar {
    width: 120px;
    height: 12px;
    border-radius: 3px;
    background: linear-gradient(to right, #1e1e1e, #22c55e);
  }

  .hover-info {
    min-height: 48px;
    padding: 8px;
    background: var(--surface2);
    border-radius: 8px;
    margin-top: 12px;
    font-size: 13px;
  }
  .hover-info .time { font-weight: 600; margin-bottom: 4px; }
  .hover-info .names { color: var(--text2); }

  .participants-list {
    margin-top: 16px;
    font-size: 13px;
    color: var(--text2);
  }
  .participants-list span {
    display: inline-block;
    padding: 2px 8px;
    background: var(--surface2);
    border-radius: 4px;
    margin: 2px;
  }

  .instruction { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
</style>
</head>
<body>

<div class="container">
  <!-- CREATE PAGE -->
  <div id="create-page">
    <header>
      <a href="/"><h1>when2meet</h1></a>
    </header>

    <div class="form-group">
      <label>Event Name</label>
      <input type="text" id="event-name" placeholder="Team sync, Dinner plans...">
    </div>

    <div class="form-group">
      <label>Select Dates</label>
      <div class="cal-nav">
        <button id="cal-prev">&larr;</button>
        <span id="cal-month-label"></span>
        <button id="cal-next">&rarr;</button>
      </div>
      <div id="calendar" class="calendar-picker"></div>
    </div>

    <div class="time-row">
      <div class="form-group">
        <label>No Earlier Than</label>
        <select id="time-start"></select>
      </div>
      <div class="form-group">
        <label>No Later Than</label>
        <select id="time-end"></select>
      </div>
      <div class="form-group">
        <label>Timezone</label>
        <select id="timezone"></select>
      </div>
    </div>

    <div style="margin-top: 24px;">
      <button class="btn btn-primary" id="create-btn">Create Event</button>
    </div>
  </div>

  <!-- EVENT PAGE -->
  <div id="event-page">
    <header>
      <a href="/"><h1>when2meet</h1></a>
    </header>

    <div class="event-header">
      <h2 id="event-title"></h2>
      <div class="share-url">
        <input type="text" id="share-url" readonly>
        <button class="btn" id="copy-btn">Copy</button>
      </div>
    </div>

    <div class="event-layout">
      <!-- Left: personal availability -->
      <div class="panel">
        <div class="name-input-row">
          <input type="text" id="participant-name" placeholder="Your name">
          <button class="btn btn-primary" id="join-btn">Join</button>
        </div>
        <div id="personal-section" style="display:none;">
          <div class="instruction">Click and drag to mark availability. Saves automatically.</div>
          <div class="grid-wrapper">
            <div id="personal-grid" class="avail-grid personal-grid"></div>
          </div>
        </div>
      </div>

      <!-- Right: group availability -->
      <div class="panel">
        <h2>Group Availability</h2>
        <div class="legend">
          <span>0</span>
          <div class="legend-bar"></div>
          <span id="legend-max">0</span>
          <span>available</span>
        </div>
        <div class="grid-wrapper">
          <div id="group-grid" class="avail-grid"></div>
        </div>
        <div id="hover-info" class="hover-info" style="display:none;">
          <div class="time" id="hover-time"></div>
          <div class="names" id="hover-names"></div>
        </div>
        <div id="participants-list" class="participants-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== State =====
let currentEvent = null;
let currentName = '';
let mySlots = new Set();
let isDragging = false;
let dragMode = null;
let dragCells = [];

// ===== Utilities =====
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function $(id) { return document.getElementById(id); }

// ===== Calendar Picker =====
const selectedDates = new Set();
let calYear, calMonth;

function initCalendar() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  renderCalendar();
}

function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }
function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); }

function renderCalendar() {
  const el = $('calendar');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  $('cal-month-label').textContent = months[calMonth] + ' ' + calYear;

  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  el.textContent = '';
  ['S','M','T','W','T','F','S'].forEach(d => {
    const hdr = document.createElement('div');
    hdr.className = 'day-header';
    hdr.textContent = d;
    el.appendChild(hdr);
  });

  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'day empty';
    el.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(calYear, calMonth, d);
    const key = dateKey(date);
    const dayEl = document.createElement('div');
    dayEl.className = 'day';
    if (date < today) dayEl.classList.add('past');
    if (selectedDates.has(key)) dayEl.classList.add('selected');
    dayEl.textContent = d;
    dayEl.dataset.date = key;
    dayEl.addEventListener('click', () => toggleDate(key));
    el.appendChild(dayEl);
  }
}

function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function toggleDate(key) {
  if (selectedDates.has(key)) selectedDates.delete(key);
  else selectedDates.add(key);
  renderCalendar();
}

// ===== Time Selects =====
function initTimeSelects() {
  const startSel = $('time-start');
  const endSel = $('time-end');
  for (let h = 0; h < 24; h++) {
    const label = (h === 0 ? 12 : h > 12 ? h - 12 : h) + ':00 ' + (h < 12 ? 'AM' : 'PM');
    const opt1 = document.createElement('option');
    opt1.value = h; opt1.textContent = label;
    if (h === 9) opt1.selected = true;
    startSel.appendChild(opt1);
    const opt2 = document.createElement('option');
    opt2.value = h; opt2.textContent = label;
    if (h === 17) opt2.selected = true;
    endSel.appendChild(opt2);
  }
  const midOpt = document.createElement('option');
  midOpt.value = 24; midOpt.textContent = '12:00 AM (next day)';
  endSel.appendChild(midOpt);
}

function initTimezones() {
  const sel = $('timezone');
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const zones = Intl.supportedValuesOf('timeZone');
  zones.forEach(z => {
    const opt = document.createElement('option');
    opt.value = z; opt.textContent = z;
    if (z === tz) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ===== Create Event =====
async function createEvent() {
  const name = $('event-name').value.trim();
  const dates = [...selectedDates].sort();
  const timeStart = parseInt($('time-start').value);
  const timeEnd = parseInt($('time-end').value);
  const timezone = $('timezone').value;

  if (!name) return alert('Enter an event name');
  if (!dates.length) return alert('Select at least one date');
  if (timeStart >= timeEnd) return alert('End time must be after start time');

  const res = await fetch('/api/events', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, dates, timeStart, timeEnd, timezone }),
  });
  const data = await res.json();
  history.pushState(null, '', '/' + data.id);
  loadEvent(data.id);
}

// ===== Load Event =====
async function loadEvent(id) {
  const res = await fetch('/api/events/' + encodeURIComponent(id));
  if (!res.ok) { showCreate(); return; }

  currentEvent = await res.json();
  $('create-page').style.display = 'none';
  $('event-page').style.display = 'block';
  $('event-title').textContent = currentEvent.name;
  $('share-url').value = window.location.href;

  renderGroupGrid();
  renderParticipantsList();

  const saved = localStorage.getItem('w2m-name-' + id);
  if (saved) {
    $('participant-name').value = saved;
    joinEvent();
  }
}

function showCreate() {
  $('create-page').style.display = 'block';
  $('event-page').style.display = 'none';
}

function copyUrl() {
  navigator.clipboard.writeText($('share-url').value);
  const btn = $('copy-btn');
  btn.textContent = 'Copied!';
  setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
}

// ===== Join Event =====
function joinEvent() {
  const name = $('participant-name').value.trim();
  if (!name) return;

  currentName = name;
  localStorage.setItem('w2m-name-' + currentEvent.id, name);
  $('personal-section').style.display = 'block';
  $('join-btn').textContent = 'Switch';

  const existing = currentEvent.participants.find(p => p.name === name);
  mySlots = new Set(existing ? existing.slots : []);

  renderPersonalGrid();
}

// ===== Grid Rendering =====
function getTimeSlots() {
  const slots = [];
  for (let h = currentEvent.time_start; h < currentEvent.time_end; h++) {
    for (let m = 0; m < 60; m += 15) {
      slots.push({ hour: h, minute: m });
    }
  }
  return slots;
}

function slotKey(date, hour, minute) {
  return date + 'T' + String(hour).padStart(2,'0') + ':' + String(minute).padStart(2,'0');
}

function formatTime(hour, minute) {
  const ampm = hour < 12 ? 'AM' : 'PM';
  const h = hour === 0 ? 12 : hour > 12 ? hour - 12 : hour;
  return h + ':' + String(minute).padStart(2,'0') + ' ' + ampm;
}

function formatDateShort(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return { dow: days[date.getDay()], label: months[date.getMonth()] + ' ' + d };
}

function buildGridHeader(dates, parent) {
  const header = document.createElement('div');
  header.className = 'grid-header';
  dates.forEach(d => {
    const info = formatDateShort(d);
    const col = document.createElement('div');
    col.className = 'col-header';
    col.appendChild(document.createTextNode(info.dow));
    col.appendChild(document.createElement('br'));
    col.appendChild(document.createTextNode(info.label));
    header.appendChild(col);
  });
  parent.appendChild(header);
}

function buildGridRow(ts, dates, cellFactory) {
  const isHour = ts.minute === 0;
  const isHalf = ts.minute === 30;
  const row = document.createElement('div');
  row.className = 'grid-row';
  if (isHour) row.classList.add('hour-start');
  else if (isHalf) row.classList.add('half-start');

  const timeLabel = document.createElement('div');
  timeLabel.className = 'grid-time';
  timeLabel.textContent = isHour ? formatTime(ts.hour, ts.minute) : '';
  row.appendChild(timeLabel);

  dates.forEach(d => {
    const key = slotKey(d, ts.hour, ts.minute);
    const cell = cellFactory(key, d);
    row.appendChild(cell);
  });
  return row;
}

function renderPersonalGrid() {
  const grid = $('personal-grid');
  grid.textContent = '';
  const dates = currentEvent.dates;
  const timeSlots = getTimeSlots();

  buildGridHeader(dates, grid);

  timeSlots.forEach(ts => {
    const row = buildGridRow(ts, dates, (key) => {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      if (mySlots.has(key)) cell.classList.add('available');
      cell.dataset.slot = key;
      return cell;
    });
    grid.appendChild(row);
  });

  attachDragHandlers(grid);
}

function renderGroupGrid() {
  const grid = $('group-grid');
  grid.textContent = '';
  const dates = currentEvent.dates;
  const timeSlots = getTimeSlots();
  const participants = currentEvent.participants;
  const totalP = participants.length;

  $('legend-max').textContent = totalP;

  const countMap = {};
  const namesMap = {};
  participants.forEach(p => {
    p.slots.forEach(s => {
      countMap[s] = (countMap[s] || 0) + 1;
      if (!namesMap[s]) namesMap[s] = [];
      namesMap[s].push(p.name);
    });
  });

  buildGridHeader(dates, grid);

  timeSlots.forEach(ts => {
    const row = buildGridRow(ts, dates, (key) => {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      const count = countMap[key] || 0;
      const names = namesMap[key] || [];
      if (count > 0 && totalP > 0) {
        const ratio = count / totalP;
        const r = Math.round(30 + (34 - 30) * ratio);
        const g = Math.round(30 + (197 - 30) * ratio);
        const b = Math.round(30 + (94 - 30) * ratio);
        cell.style.background = 'rgb(' + r + ',' + g + ',' + b + ')';
      }
      cell.dataset.slot = key;
      cell.dataset.count = count;
      cell.dataset.names = names.join(', ');
      cell.addEventListener('mouseenter', () => showHover(cell));
      cell.addEventListener('mouseleave', hideHover);
      return cell;
    });
    grid.appendChild(row);
  });
}

function renderParticipantsList() {
  const el = $('participants-list');
  el.textContent = '';
  if (!currentEvent.participants.length) {
    el.textContent = 'No participants yet';
    return;
  }
  const label = document.createElement('div');
  label.style.cssText = 'margin-bottom:4px;font-size:12px;color:var(--text2);';
  label.textContent = 'Participants:';
  el.appendChild(label);
  currentEvent.participants.forEach(p => {
    const span = document.createElement('span');
    span.textContent = p.name;
    el.appendChild(span);
  });
}

// ===== Hover on Group Grid =====
function showHover(cell) {
  const info = $('hover-info');
  const slot = cell.dataset.slot;
  const count = cell.dataset.count;
  const names = cell.dataset.names;
  const total = currentEvent.participants.length;

  const [date, time] = slot.split('T');
  const [h, m] = time.split(':').map(Number);
  const dateInfo = formatDateShort(date);

  info.style.display = 'block';
  $('hover-time').textContent = dateInfo.dow + ' ' + dateInfo.label + ' ' + formatTime(h, m) + ' \u2014 ' + count + '/' + total + ' available';
  $('hover-names').textContent = names || 'Nobody';
}

function hideHover() {
  $('hover-info').style.display = 'none';
}

// ===== Drag to Select (Personal Grid) =====
function attachDragHandlers(grid) {
  function startDrag(e) {
    e.preventDefault();
    isDragging = true;
    dragCells = [];
    const target = e.target.closest('.grid-cell');
    if (!target) return;
    dragMode = mySlots.has(target.dataset.slot) ? 'remove' : 'add';
    applyDrag(target);
  }

  function moveDrag(e) {
    if (!isDragging) return;
    e.preventDefault();
    const target = e.type.startsWith('touch')
      ? document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY)
      : e.target;
    if (target && target.classList.contains('grid-cell')) {
      applyDrag(target);
    }
  }

  function endDrag() {
    if (!isDragging) return;
    isDragging = false;
    dragCells.forEach(c => c.classList.remove('dragging'));
    dragCells = [];
    saveAvailability();
  }

  function applyDrag(cell) {
    const key = cell.dataset.slot;
    if (dragMode === 'add') {
      mySlots.add(key);
      cell.classList.add('available');
    } else {
      mySlots.delete(key);
      cell.classList.remove('available');
    }
    if (!dragCells.includes(cell)) {
      dragCells.push(cell);
      cell.classList.add('dragging');
    }
  }

  grid.addEventListener('mousedown', startDrag);
  grid.addEventListener('mousemove', moveDrag);
  document.addEventListener('mouseup', endDrag);
  grid.addEventListener('touchstart', startDrag, { passive: false });
  grid.addEventListener('touchmove', moveDrag, { passive: false });
  document.addEventListener('touchend', endDrag);
}

// ===== Save Availability =====
let saveTimeout = null;
function saveAvailability() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    const slots = [...mySlots];
    await fetch('/api/events/' + encodeURIComponent(currentEvent.id) + '/availability', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: currentName, slots }),
    });
    const res = await fetch('/api/events/' + encodeURIComponent(currentEvent.id));
    currentEvent = await res.json();
    renderGroupGrid();
    renderParticipantsList();
  }, 300);
}

// ===== Routing =====
function route() {
  const path = window.location.pathname.slice(1);
  if (path && path !== '/') {
    loadEvent(path);
  } else {
    showCreate();
  }
}

window.addEventListener('popstate', route);

// ===== Event Listeners =====
$('cal-prev').addEventListener('click', calPrev);
$('cal-next').addEventListener('click', calNext);
$('create-btn').addEventListener('click', createEvent);
$('copy-btn').addEventListener('click', copyUrl);
$('join-btn').addEventListener('click', joinEvent);

// ===== Init =====
initCalendar();
initTimeSelects();
initTimezones();
route();
</script>
</body>
</html>
